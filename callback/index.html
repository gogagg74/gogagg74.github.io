<!DOCTYPE html>
<html>
<head>
    <title>SmartScan EV Authentication</title>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            
            if (code) {
                // 🚀 შეცვლილია callback-ზე, რათა იდეალურად დაემთხვეს Tesla-ს პანელს!
                    window.location.href = "smartscanev://test?code=" + code + "&state=" + state;
            } else {
                document.body.innerHTML = "<h3>Error: Authentication code not found.</h3>";
            }
        }
    </script>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        Redirecting to SmartScan EV app...
    </p>
</body>
</html>
